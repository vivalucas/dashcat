name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Build DashCat
        run: |
          xcodebuild -project DashCat.xcodeproj \
            -scheme DashCat \
            -configuration Release \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.version }}" \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build"

      - name: Create DMG
        run: |
          APP_PATH="build/DashCat.app"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="DashCat-${VERSION}.dmg"
          VOLUME_NAME="DashCat"

          # Create a staging folder with app + Applications symlink
          STAGING="$(mktemp -d)"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          # Create compressed DMG
          hdiutil create -volname "$VOLUME_NAME" -srcfolder "$STAGING" \
            -fs HFS+ -format UDZO -imagekey zlib-level=9 "$DMG_NAME"
          rm -rf "$STAGING"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: DashCat-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
