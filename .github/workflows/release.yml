name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DashCat
        run: |
          xcodebuild -project DashCat.xcodeproj \
            -scheme DashCat \
            -configuration Release \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build"

      - name: Create DMG
        run: |
          APP_PATH="build/DashCat.app"
          DMG_NAME="DashCat.dmg"
          DMG_TEMP="DashCat_temp.dmg"
          VOLUME_NAME="DashCat"

          # Create a temporary DMG
          hdiutil create -srcfolder "$APP_PATH" \
            -volname "$VOLUME_NAME" \
            -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" \
            -format UDRW \
            "$DMG_TEMP"

          # Mount it
          DEVICE=$(hdiutil attach -readwrite -noverify -noautoopen "$DMG_TEMP" | \
            egrep '^/dev/' | sed 1q | awk '{print $1}')
          MOUNT_POINT="/Volumes/$VOLUME_NAME"

          # Create Applications shortcut
          ln -s /Applications "$MOUNT_POINT/Applications"

          # Set window properties
          osascript -e "
            tell application \"Finder\"
              tell disk \"$VOLUME_NAME\"
                open
                set current view of container window to icon view
                set toolbar visible of container window to false
                set statusbar visible of container window to false
                set the bounds of container window to {400, 100, 900, 450}
                set theViewOptions to the icon view options of container window
                set arrangement of theViewOptions to not arranged
                set icon size of theViewOptions to 80
                set background picture of theViewOptions to file \"background.png\" of folder \"Pictures\" of folder \"Resources\" of disk \"$VOLUME_NAME\"
              end tell
            end tell
          " 2>/dev/null || true

          # Sync and unmount
          sync
          hdiutil detach "$DEVICE" -quiet

          # Convert to compressed read-only DMG
          hdiutil convert "$DMG_TEMP" -format UDZO -imagekey zlib-level=9 -o "$DMG_NAME"
          rm -f "$DMG_TEMP"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: DashCat.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
